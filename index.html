<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语精读存档</title>
<style>
  :root{
    --bg:#f5f0eb; --card:#fffdfa; --text:#3a322b; --muted:#8a7d6e;
    --brick:#b5482f; --olive:#6b7a3a; --gold:#c89b3c; --shadow:0 4px 18px rgba(120,90,60,.10);
    --radius:14px; --transition:.25s;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:Georgia,"Noto Serif SC",serif;
    padding:32px 16px 60px;line-height:1.7;}
  .wrap{max-width:760px;margin:0 auto;}
  .header{background:linear-gradient(90deg,var(--brick),var(--gold),var(--olive));
    height:5px;border-radius:5px;margin-bottom:26px;animation:flow 6s linear infinite;
    background-size:200% 100%;}
  @keyframes flow{to{background-position:200% 0;}}
  h1{font-size:28px;margin-bottom:6px;letter-spacing:.5px;}
  .sub{color:var(--muted);font-size:14px;margin-bottom:30px;}
  .year{margin-bottom:26px;}
  .ytitle{font-size:18px;color:var(--brick);border-left:4px solid var(--gold);
    padding-left:10px;margin-bottom:12px;}
  .item{display:block;background:var(--card);border-radius:var(--radius);padding:14px 18px;
    box-shadow:var(--shadow);margin-bottom:10px;text-decoration:none;color:var(--text);
    transition:var(--transition);}
  .item:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(120,90,60,.16);}
  .item b{color:var(--olive);}
  .item span{color:var(--muted);font-size:13px;display:block;margin-top:3px;}
  .empty{color:var(--muted);font-style:italic;font-size:14px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="header"></div>
  <h1>📚 英语精读存档</h1>
  <div class="sub">按年份分类 · 手机/电脑均可交互阅读（可展开折叠、带动画）</div>

  <div class="year">
    <div class="ytitle">2009 年</div>
    <a class="item" href="2009/英二-text2.html">
      <b>2009 考研英语（二）· Text 2</b>
      <span>亲子鉴定与 DNA 检测的商业乱象与局限</span>
    </a>
  </div>

  <!-- 新增文章时，按下面的模板复制一个 .item 即可 -->
  <!--
  <div class="year">
    <div class="ytitle">YYYY 年</div>
    <a class="item" href="YYYY/xxx.html">
      <b>标题</b>
      <span>副标题/说明</span>
    </a>
  </div>
  -->
</div>
</body>
</html>
