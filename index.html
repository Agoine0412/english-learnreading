<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>英语精读存档</title>
<style>
/* ====== 🎨 全局变量 —— 暖米色浅色主题 ====== */
:root {
  --bg: #f5f0eb;
  --bg-subtle: #efe8e0;
  --bg-card: #ffffff;
  --bg-glass: rgba(255,252,248,.72);
  --bg-glass-hover: rgba(255,252,248,.85);

  --text: #2c1810;
  --text-title: #1a0e08;
  --text-body: #4a3428;
  --text-sub: #6a5448;
  --text-muted: #9a8878;

  --brick: #b54830;
  --olive: #5a7828;
  --gold: #c89820;
  --teal: #2a9d8f;
  --blue: #4a80c0;
  --rose: #c85050;

  --glass-blur: 14px;
  --glass-blur-strong: 22px;
  --glass-border: rgba(200,180,160,.18);

  --shadow-sm: 0 2px 8px rgba(80,60,40,.08);
  --shadow-md: 0 4px 20px rgba(80,60,40,.12);
  --shadow-lg: 0 8px 40px rgba(80,60,40,.16);
  --shadow-xl: 0 20px 60px rgba(80,60,40,.22);
  --shadow-book: 0 30px 80px rgba(80,60,40,.25), 0 10px 30px rgba(80,60,40,.15), inset -4px 0 20px rgba(0,0,0,.06);

  --radius-sm: 10px;
  --radius: 16px;
  --radius-lg: 24px;
  --ease-out: cubic-bezier(.22,1,.36,1);
  --ease-spring: cubic-bezier(.34,1.56,.64,1);
  --transition: .3s var(--ease-out);

  --font-serif: "Noto Serif SC", "Source Han Serif CN", "Songti SC", "SimSun", Georgia, "PingFang SC", "Microsoft YaHei", "Heiti SC", serif;
  --font-sans: -apple-system, "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;

  /* 年份卡片配色 */
  --card-2008: linear-gradient(145deg, #fef0ea 0%, #fce4d6 50%, #fdf2ec 100%);
  --card-2008-accent: #d4623e;
  --card-2008-glow: rgba(212,98,62,.15);
  --card-2009: linear-gradient(145deg, #e8f4f2 0%, #d4ebe6 50%, #edf7f5 100%);
  --card-2009-accent: #389e92;
  --card-2009-glow: rgba(56,158,146,.15);
  --card-2015: linear-gradient(145deg, #f2f5dc 0%, #e6ebc4 50%, #f5f7e3 100%);
  --card-2015-accent: #7a9420;
  --card-2015-glow: rgba(122,148,32,.15);
  --card-2016: linear-gradient(145deg, #eef1f9 0%, #dce4f5 50%, #eaf0fa 100%);
  --card-2016-accent: #2c3e7a;
  --card-2016-glow: rgba(44,62,122,.15);
  --card-2010: linear-gradient(145deg, #f7ede4 0%, #efe0d3 50%, #f6ece2 100%);
  --card-2010-accent: #b54830;
  --card-2010-glow: rgba(181,72,48,.15);
  --card-2014: linear-gradient(145deg, #fdf5e8 0%, #faead0 50%, #fcf2e0 100%);
  --card-2014-accent: #c97d2a;
  --card-2014-glow: rgba(201,125,42,.15);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  line-height: 1.7;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ====== 🌈 浅色动态背景 ====== */
.bg-layer {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  z-index: 0; pointer-events: none;
}
.bg-orb {
  position:absolute;border-radius:50%;filter:blur(80px);opacity:.35;
}
.bg-orb-1{width:320px;height:320px;background:radial-gradient(circle,rgba(181,72,47,.30),transparent 70%);top:-10%;left:-5%;animation:warmDrift1 16s ease-in-out infinite alternate;}
.bg-orb-2{width:280px;height:280px;background:radial-gradient(circle,rgba(107,122,58,.25),transparent 70%);bottom:-8%;right:-6%;animation:warmDrift2 20s ease-in-out infinite alternate;}
.bg-orb-3{width:220px;height:220px;background:radial-gradient(circle,rgba(200,155,60,.22),transparent 70%);top:45%;left:55%;animation:warmDrift3 14s ease-in-out infinite alternate;}
.bg-orb-4{width:160px;height:160px;background:radial-gradient(circle,rgba(42,157,143,.18),transparent 70%);top:15%;right:20%;animation:warmDrift4 18s ease-in-out infinite alternate;}
@keyframes warmDrift1{0%{transform:translate(0,0)scale(1)}100%{transform:translate(80px,50px)scale(1.12)}}
@keyframes warmDrift2{0%{transform:translate(0,0)scale(1)}100%{transform:translate(-60px,-40px)scale(1.08)}}
@keyframes warmDrift3{0%{transform:translate(0,0)scale(1)}100%{transform:translate(-40px,30px)scale(1.05)}}
@keyframes warmDrift4{0%{transform:translate(0,0)scale(1)}100%{transform:translate(30px,-25px)scale(1.08)}}
.bg-texture{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;opacity:.035;
  background-image:url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 20h40M20 0v40' stroke='%238a7060' stroke-width='.5' fill='none'/%3E%3C/svg%3E");
  background-size:40px 40px;
}

.wrap { max-width: 900px; margin: 0 auto; position: relative; z-index: 2; padding: 16px 16px 64px; }

/* ====== 📖 封面视图（3D 书本）—— 保持不变 ====== */
.cover-view {
  display: flex; align-items: center; justify-content: center;
  min-height: calc(100vh - 128px); padding: 48px 24px;
  transition: opacity .5s var(--ease-out), transform .5s var(--ease-out);
}
.cover-view.hiding { opacity: 0; transform: scale(.9) translateY(-40px); }

.book-3d-container {
  perspective: 1200px; cursor: pointer;
  animation: bookFlyIn 1s var(--ease-out) both;
}
@keyframes bookFlyIn {
  from { opacity: 0; transform: translateY(80px) rotateX(12deg); }
  to   { opacity: 1; transform: translateY(0) rotateX(0deg); }
}

.book-3d {
  position: relative; width: 300px; height: 380px;
  transform-style: preserve-3d;
  transform: rotateY(-18deg) rotateX(4deg);
  transition: transform .6s var(--ease-spring);
  animation: bookFloat 4s ease-in-out infinite;
}
@keyframes bookFloat {
  0%, 100% { transform: rotateY(-18deg) rotateX(4deg) translateY(0); }
  50%      { transform: rotateY(-14deg) rotateX(2deg) translateY(-12px); }
}
.book-3d-container:hover .book-3d {
  transform: rotateY(-8deg) rotateX(0deg) scale(1.04);
}

.book-spine {
  position:absolute;left:0;top:4px;bottom:4px;width:36px;
  background:linear-gradient(180deg,var(--brick),#a03822,var(--brick) 25%,var(--gold) 50%,var(--olive) 75%,var(--teal) 90%,var(--blue));
  border-radius:3px 0 0 3px;box-shadow:inset -3px 0 8px rgba(0,0,0,.15);
  transform-origin:left center;transform:rotateY(-90deg) translateX(-18px);
}
.book-spine::after {
  content:'';position:absolute;right:4px;top:20px;bottom:20px;width:2px;border-radius:1px;
  background:linear-gradient(180deg,transparent,rgba(255,255,255,.25),transparent);
}

.book-front {
  position:absolute;left:36px;top:0;width:calc(100% - 36px);height:100%;
  border-radius:0 6px 6px 0;overflow:hidden;
  background:linear-gradient(135deg,rgba(255,250,240,.95),rgba(245,235,220,.92),rgba(255,250,240,.96));
  box-shadow:var(--shadow-book),inset 0 1px 0 rgba(255,255,255,.7),inset 0 -1px 0 rgba(0,0,0,.05);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;
  backface-visibility:hidden;
}
.book-front::before {
  content:'';position:absolute;top:0;left:0;right:0;height:6px;
  background:linear-gradient(90deg,var(--brick),var(--gold),var(--olive),var(--teal));
  background-size:200% 100%;animation:shimmerFlow 6s linear infinite;
}
@keyframes shimmerFlow { to { background-position: -200% 0; } }
.book-front::after {
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:conic-gradient(from 210deg at 50% 50%,transparent 0%,rgba(255,255,255,.08) 6%,transparent 12%);
  pointer-events:none;animation:glossSweep 10s linear infinite;
}
@keyframes glossSweep { to { transform: rotate(360deg); } }

.cover-inner { position:relative;z-index:1;text-align:center; }
.cover-icon-wrap {
  font-size:56px;margin-bottom:20px;
  filter:drop-shadow(0 4px 12px rgba(200,155,60,.2));
  animation:iconPulse 3s ease-in-out infinite;
}
@keyframes iconPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
.cover-title {
  font-size:26px;font-weight:700;color:var(--text-title);font-family:var(--font-serif);
  letter-spacing:2px;margin-bottom:8px;text-shadow:0 1px 2px rgba(0,0,0,.08);
}
.cover-desc { color:var(--text-sub);font-size:13.5px;margin-bottom:28px; }
.cover-hint {
  color:var(--text-muted);font-size:13px;display:inline-flex;align-items:center;gap:8px;
  animation:hintPulse 2.5s ease-in-out infinite;
}
@keyframes hintPulse { 0%,100%{opacity:1} 50%{opacity:.45} }
.cover-hint-arrow { font-size:18px;transition:transform .25s var(--ease-spring); }
.book-3d-container:hover .cover-hint-arrow { transform:translateY(6px); }

.book-pages-right {
  position:absolute;right:-3px;top:4px;bottom:4px;width:8px;
  border-radius:0 4px 4px 0;
  background:repeating-linear-gradient(to bottom,#fff 0px,#f5f0e8 1px,#fff 2px);
  box-shadow:inset -1px 0 3px rgba(0,0,0,.08);
  transform-origin:right center;transform:rotateY(85deg) translateZ(-2px);
}
.book-pages-top {
  position:absolute;right:-1px;top:-2px;left:38px;height:6px;
  background:linear-gradient(to bottom,#f8f4ee,#ebe3d8);
  border-radius:0 4px 0 0;transform:rotateX(88deg) translateZ(-1px);
  box-shadow:0 1px 2px rgba(0,0,0,.06);
}

.cover-bottom-text {
  position:absolute;bottom:32px;left:52px;right:16px;text-align:center;z-index:1;
}
.cover-bottom-text span {
  display:block;font-size:11px;color:var(--gold);font-weight:600;letter-spacing:3px;
  text-transform:uppercase;font-family:var(--font-sans);text-shadow:0 1px 1px rgba(0,0,0,.06);
}

/* ====== 📚 内容视图 —— 3D 卡片轮播 ====== */
.content-view {
  opacity: 0; transform: translateY(60px) scale(.97);
  pointer-events: none;
  transition: opacity .55s var(--ease-out), transform .55s var(--ease-spring);
  max-height: 0; overflow: hidden;
}
.content-view.showing {
  opacity: 1; transform: translateY(0) scale(1);
  pointer-events: auto; max-height: none; overflow-x: hidden; overflow-y: visible;
  /* 垂直居中布局，让轮播区域在手机上不偏上 */
  display: flex; flex-direction: column; min-height: calc(100vh - 100px);
}

/* ---- Hero 栏（带返回按钮）---- */
.hero {
  position: relative; margin: 20px auto 28px;
  padding: 28px 30px 24px;
  background: var(--bg-glass);
  backdrop-filter: blur(var(--glass-blur-strong)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--glass-blur-strong)) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  overflow: hidden;
}
.hero::before {
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--brick),var(--gold),var(--olive),var(--teal));
  background-size:200% 100%;animation:shimmerFlow 8s linear infinite;
}
.hero-top {
  display:flex;align-items:center;justify-content:space-between;gap:12px;position:relative;z-index:1;
}
.hero-title-wrap { display:flex;align-items:center;gap:14px; }
.hero-icon { font-size:36px;line-height:1;flex-shrink:0; }
.hero h1 { font-size:25px;letter-spacing:.5px;font-family:var(--font-serif);color:var(--text-title); }
.back-btn {
  display:inline-flex;align-items:center;gap:6px;padding:8px 16px;
  border:1px solid var(--glass-border);border-radius:var(--radius-sm);
  background:var(--bg-glass);backdrop-filter:blur(8px);
  color:var(--text-sub);font-size:13px;font-family:var(--font-sans);
  cursor:pointer;transition:all var(--transition);flex-shrink:0;
}
.back-btn:hover { background:var(--bg-glass-hover);color:var(--text);transform:translateY(-1px);box-shadow:var(--shadow-sm); }

/* ====== 🎴 3D 年份卡片轮播 ====== */
.carousel-container {
  position: relative;
  width: 100%;
  height: 420px;
  perspective: 1400px;
  margin: 0 auto;
  /* 在 flex 容器中撑满剩余空间 */
  flex: 1 1 auto;
  min-height: 0;
  /* 隔离合成层，防止卡片 transform 影响外部布局导致抖动 */
  isolation: isolate;
}
.carousel-track {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform .65s cubic-bezier(.23,1,.32,1);
  /* 隔离卡片变换，防止切换时影响外部布局导致抽动 */
  overflow: hidden;
  /* 防止触摸时触发浏览器默认手势导致抖动 */
  touch-action: pan-y;
}

/* 单张年份卡片 */
.year-card {
  position: absolute;
  width: 260px;
  height: 340px;
  left: 50%; top: 50%;
  margin-left: -130px; margin-top: -170px;
  border-radius: var(--radius-lg);
  cursor: pointer;
  backface-visibility: hidden;
  transform-style: preserve-3d;
  transition:
    transform .55s cubic-bezier(.23,1,.32,1),
    box-shadow .4s var(--ease-out),
    filter .4s var(--ease-out),
    opacity .4s var(--ease-out);
  will-change: transform, opacity;
  /* 包含布局变化，防止 transform 触发外部重排 */
  contain: layout style;
}
.year-card .yc-inner {
  width: 100%; height: 100%;
  border-radius: var(--radius-lg);
  padding: 32px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(0,0,0,.06);
  box-shadow:
    0 8px 32px rgba(0,0,0,.10),
    0 2px 8px rgba(0,0,0,.06),
    inset 0 1px 0 rgba(255,255,255,.6);
}
/* 卡片光泽 */
.year-card .yc-inner::before {
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:conic-gradient(from 210deg at 50% 50%,transparent 0%,rgba(255,255,255,.12) 6%,transparent 12%);
  pointer-events:none;animation:glossSweep 12s linear infinite;
}
/* 底部色条 */
.year-card .yc-inner::after {
  content:'';position:absolute;bottom:0;left:20%;right:20%;height:3px;
  border-radius:3px;background:var(--yc-accent);opacity:.6;
}

/* 年份卡片内容 */
.yc-year {
  font-size: 52px;
  font-weight: 800;
  font-family: var(--font-serif);
  color: var(--yc-accent);
  line-height: 1;
  margin-bottom: 8px;
  text-shadow: 0 2px 12px var(--yc-glow);
  letter-spacing: -1px;
}
.yc-label {
  font-size: 13px;
  color: var(--text-sub);
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 20px;
  opacity: .7;
}
.yc-count {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 18px;
  border-radius: 24px;
  background: rgba(255,255,255,.55);
  font-size: 13px;
  font-weight: 600;
  color: var(--yc-accent);
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
  backdrop-filter: blur(8px);
}
.yc-count-num { font-weight: 800; font-size: 16px; }
.yc-icon {
  font-size: 28px;
  margin-bottom: 16px;
  filter: drop-shadow(0 3px 8px rgba(0,0,0,.06));
}
.yc-hint {
  position: absolute; bottom: 24px; left: 0; right: 0; text-align: center;
  font-size: 11.5px; color: var(--text-muted);
  opacity: 0; transition: opacity .3s;
}
.year-card.active .yc-hint { opacity: 1; animation: hintPulse 2.5s ease-in-out infinite; }

/* 各年份配色 */
.year-card[data-y="2008"] .yc-inner { background: var(--card-2008); --yc-accent: var(--card-2008-accent); --yc-glow: var(--card-2008-glow); }
.year-card[data-y="2009"] .yc-inner { background: var(--card-2009); --yc-accent: var(--card-2009-accent); --yc-glow: var(--card-2009-glow); }
.year-card[data-y="2015"] .yc-inner { background: var(--card-2015); --yc-accent: var(--card-2015-accent); --yc-glow: var(--card-2015-glow); }
.year-card[data-y="2016"] .yc-inner { background: var(--card-2016); --yc-accent: var(--card-2016-accent); --yc-glow: var(--card-2016-glow); }
.year-card[data-y="2010"] .yc-inner { background: var(--card-2010); --yc-accent: var(--card-2010-accent); --yc-glow: var(--card-2010-glow); }
.year-card[data-y="2014"] .yc-inner { background: var(--card-2014); --yc-accent: var(--card-2014-accent); --yc-glow: var(--card-2014-glow); }

/* 轮播位置状态 */
/* 中间（激活）*/
.year-card.pos-center {
  transform: translateZ(0px) scale(1);
  opacity: 1;
  z-index: 10;
  filter: brightness(1);
  box-shadow:
    0 20px 60px rgba(0,0,0,.14),
    0 8px 24px rgba(0,0,0,.10),
    inset 0 1px 0 rgba(255,255,255,.6);
}
/* 左侧 */
.year-card.pos-left {
  transform: translateX(-280px) translateZ(-120px) rotateY(22deg) scale(.85);
  opacity: .65;
  z-index: 5;
  filter: brightness(.92);
  box-shadow: 0 8px 24px rgba(0,0,0,.08);
}
/* 右侧 */
.year-card.pos-right {
  transform: translateX(280px) translateZ(-120px) rotateY(-22deg) scale(.85);
  opacity: .65;
  z-index: 5;
  filter: brightness(.92);
  box-shadow: 0 8px 24px rgba(0,0,0,.08);
}
/* 最左侧（隐藏）*/
.year-card.pos-far-left {
  transform: translateX(-520px) translateZ(-300px) rotateY(35deg) scale(.65);
  opacity: 0;
  z-index: 1;
  pointer-events: none;
}
/* 最右侧（隐藏）*/
.year-card.pos-far-right {
  transform: translateX(520px) translateZ(-300px) rotateY(-35deg) scale(.65);
  opacity: 0;
  z-index: 1;
  pointer-events: none;
}

.year-card.active { z-index: 15; }
.year-card:not(.pos-center):hover { filter: brightness(.98); opacity: .8; }

/* 导航箭头 —— 玻璃质感圆角胶囊 */
.carousel-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 46px; height: 46px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,.5);
  background: linear-gradient(145deg, rgba(255,255,255,.9), rgba(255,255,255,.6));
  backdrop-filter: blur(16px) saturate(200%);
  -webkit-backdrop-filter: blur(16px) saturate(200%);
  color: var(--text-sub);
  font-size: 20px;
  font-weight: 700;
  line-height: 1;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 20;
  transition: all .35s cubic-bezier(.22,1,.36,1);
  box-shadow:
    0 4px 18px rgba(80,60,40,.14),
    0 1px 4px rgba(80,60,40,.08),
    inset 0 1px 0 rgba(255,255,255,.7);
  overflow: hidden;
}
.carousel-nav::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(135deg, rgba(255,255,255,.4) 0%, transparent 50%);
  pointer-events: none;
}
.carousel-nav:hover {
  background: linear-gradient(145deg, rgba(255,255,255,.98), rgba(255,255,255,.75));
  color: var(--text);
  transform: translateY(-50%) scale(1.15);
  box-shadow:
    0 8px 32px rgba(80,60,40,.22),
    0 2px 10px rgba(80,60,40,.14),
    inset 0 1px 0 rgba(255,255,255,.8);
  border-color: rgba(255,255,255,.7);
}
.carousel-nav:active {
  transform: translateY(-50%) scale(.92);
  transition-duration: .1s;
  box-shadow: 0 2px 8px rgba(80,60,40,.12);
}
.carousel-nav.prev { left: -6px; }
.carousel-nav.next { right: -6px; }

/* 轮播指示点 */
.carousel-dots {
  display: flex; justify-content: center; gap: 10px; margin-top: 20px;
}
.carousel-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(0,0,0,.12);
  border: none; cursor: pointer;
  transition: all .35s var(--ease-out);
  padding: 0;
}
.carousel-dot.active {
  width: 28px; border-radius: 5px;
  background: var(--text-sub);
}
.carousel-dot:hover:not(.active) { background: rgba(0,0,0,.25); }

/* ====== 📋 文章列表弹层（点击年份卡片后展开）====== */
.articles-overlay {
  position: fixed;
  top: 0; left: 0; width: 100vw; height: 100vh;
  z-index: 100;
  display: flex;

      { href: '2015/英二-text4.html', title: 'Text 4', desc: '就业市场：被忽视的兼职真相与奥巴马医改', num: 4 }
    ],
    '2016': [
      { href: '2016/英二-text1.html', title: 'Text 1', desc: '编程教育：从高中课堂到数字素养', num: 1 }
    ]
  };

  // ===== 缓存破坏：强制移动端/浏览器重新请求最新文章页，绕过 HTML 缓存 =====
  (function () {
    const ART_CACHE_VER = '20260720';
    Object.values(articlesData).forEach(list => list.forEach(a => {
      if (a.href && !a.href.includes('?v=')) a.href += '?v=' + ART_CACHE_VER;
    }));
  })();

  // 年份对应的强调色
  const yearAccent = { '2008': '#d4623e', '2009': '#389e92', '2010': '#b54830', '2014': '#c97d2a', '2015': '#7a9420', '2016': '#2c3e7a' };
  const yearIcon = { '2008': '📕', '2009': '📘', '2010': '📕', '2014': '📒', '2015': '📗', '2016': '📙' };

  const POSITIONS = ['pos-center', 'pos-right', 'pos-far-right', 'pos-far-left', 'pos-left'];
  // pos-far-left 是索引 -2 的位置，pos-left 是索引 -1

  function getPosClass(offset) {
    // offset: 相对于 current 的偏移量
    if (offset === 0) return 'pos-center';
    if (offset === 1) return 'pos-right';
    if (offset >= 2) return 'pos-far-right';
    if (offset === -1 || offset === TOTAL - 1) return 'pos-left';
    return 'pos-far-left';
  }

  function updateCarousel(newIdx, animate) {
    if (animate !== false) {
      cards.forEach(card => {
        card.classList.remove('active');
      });
    }

    cards.forEach((card, i) => {
      // 计算相对偏移（考虑循环）
      let offset = i - newIdx;
      if (offset > TOTAL / 2) offset -= TOTAL;
      if (offset < -TOTAL / 2) offset += TOTAL;

      // 清除所有位置类
      POSITIONS.forEach(p => card.classList.remove(p));

      const posClass = getPosClass(offset);
      card.classList.add(posClass);

      if (offset === 0 && animate !== false) {
        card.classList.add('active');
      }
    });

    // 更新指示点
    dots.forEach((dot, i) => {
      dot.classList.toggle('active', i === newIdx);
    });

    currentIdx = newIdx;
  }

  function carouselNext() {
    updateCarousel((currentIdx + 1) % TOTAL);
  }

  function carouselPrev() {
    updateCarousel((currentIdx - 1 + TOTAL) % TOTAL);
  }

  function carouselGoTo(idx) {
    updateCarousel(idx);
  }

  window.carouselNext = carouselNext;
  window.carouselPrev = carouselPrev;
  window.carouselGoTo = carouselGoTo;

  // 自动统计每张卡片的文章数量（从 articlesData 取）
  document.querySelectorAll('.yc-count-num').forEach(el => {
    const year = el.dataset.year;
    const articles = articlesData[year];
    if (articles) el.textContent = articles.length;
  });

  // 触摸滑动支持
  let touchStartX = 0;
  let touchEndX = 0;
  const track = document.getElementById('carouselTrack');

  track.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].screenX;
  }, { passive: true });

  track.addEventListener('touchend', e => {
    touchEndX = e.changedTouches[0].screenX;
    const diff = touchStartX - touchEndX;
    if (Math.abs(diff) > 50) {
      if (diff > 0) carouselNext();
      else carouselPrev();
    }
  }, { passive: true });

  // 键盘导航
  document.addEventListener('keydown', e => {
    if (!isOpen) return;
    if (e.key === 'ArrowRight') carouselNext();
    else if (e.key === 'ArrowLeft') carouselPrev();
    else if (e.key === 'Escape') closeBook();
  });

  /* ====== 📋 文章面板逻辑 ====== */
  const overlay = document.getElementById('articlesOverlay');
  const panel = document.getElementById('articlesPanel');
  const apHeader = document.getElementById('apHeader');
  const apYearNum = document.getElementById('apYearNum');
  const apList = document.getElementById('apList');

  function openArticles(cardEl) {
    // 如果不是中心卡片，先切换过去再打开
    const idx = parseInt(cardEl.dataset.idx);
    if (idx !== currentIdx) {
      updateCarousel(idx);
      // 等动画完成后打开面板
      setTimeout(() => showPanel(cardEl.dataset.y), 550);
    } else {
      showPanel(cardEl.dataset.y);
    }
  }

  function showPanel(yearStr) {
    const articles = articlesData[yearStr];
    if (!articles) return;

    // 设置头部颜色
    apHeader.style.setProperty('--ap-accent', yearAccent[yearStr]);
    apYearNum.textContent = yearStr;
    apYearNum.style.color = yearAccent[yearStr];

    // 渲染文章列表（带交错动画）
    apList.innerHTML = articles.map((art, i) => `
      <a class="ap-item" href="${art.href}" style="opacity:0;transform:translateY(12px);animation:apItemIn .4s ${.08 * i}s var(--ease-out) both;">
        <span class="ap-item-icon">${art.num}</span>
        <span class="ap-item-b">${yearStr} 考研英语（二）· ${art.title}</span>
        <span class="ap-item-span">${art.desc}</span>
      </a>
    `).join('');

    // 显示遮罩
    requestAnimationFrame(() => {
      overlay.classList.add('show');
      document.body.style.overflow = 'hidden';
    });
  }

  function closeArticles() {
    overlay.classList.remove('show');
    document.body.style.overflow = '';
    setTimeout(() => { apList.innerHTML = ''; }, 400);
  }

  window.openArticles = openArticles;
  window.closeArticles = closeArticles;

  // 点击遮罩外部关闭
  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeArticles();
  });

  // 文章链接也走翻书动画（如果需要的话）
  apList.addEventListener('click', e => {
    const link = e.target.closest('.ap-item[href]');
    if (link) {
      e.preventDefault(); // 阻止 <a> 默认导航，避免重复历史记录
      closeArticles();
      sessionStorage.setItem('view', 'carousel'); // 记住当前在轮播视图
      setTimeout(() => { window.location.href = link.href; }, 300);
    }
  });

  // 初始化轮播位置（动态适配任意数量卡片，新增年份只需加卡片DOM+articlesData）
  updateCarousel(0);
})();

// 动画 keyframe 注入
const styleSheet = document.createElement('style');
styleSheet.textContent = `
  @keyframes apItemIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
`;
document.head.appendChild(styleSheet);
</script>
</body>
</html>
